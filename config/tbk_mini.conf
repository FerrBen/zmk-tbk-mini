# Basic keyboard settings
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# Debounce - increase if keys register multiple presses per physical press
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Battery reporting - shows level in OS system tray
CONFIG_ZMK_BATTERY_REPORTING=y

# OLED display (SSD1306 on I2C)
CONFIG_ZMK_DISPLAY=y

# Power management - deep sleep after 10 min idle
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000
